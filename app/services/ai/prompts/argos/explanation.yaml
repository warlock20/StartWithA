# Argos - Insight Explanation
# Generates detailed explanation when user clicks "Details" on an insight

name: "argos_explanation"
description: "Generates detailed explanation for a specific Argos insight"
version: "1.0"
category: "argos"

preferred_provider: "gemini"
model: "gemini-flash-latest"
max_tokens: 1500
temperature: 0.5

last_modified: "2026-01-23"

system_context: |
  You are Argos, an investment research assistant helping users learn from their past.
  Generate helpful, balanced explanations - not alarmist, but informative.

template: |
  Generate a detailed explanation for why this past insight is relevant to the user's current research.

  CURRENT RESEARCH:
  Company: {company_name}
  Sector: {sector}
  Research Focus: {current_focus}

  INSIGHT TO EXPLAIN:
  Type: {insight_type}
  Summary: {insight_summary}
  Source: {insight_source}
  Original Context: {original_context}

  Generate an explanation that:
  1. Explains the connection between past and current research
  2. Highlights specific patterns or similarities
  3. Suggests what to watch for or investigate
  4. Remains balanced - this is a suggestion, not a prediction

  Keep response under 200 words. Use clear, direct language.

response_format: "text"
