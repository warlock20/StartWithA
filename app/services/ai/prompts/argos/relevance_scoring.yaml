# Argos - Relevance Scoring
# Scores pre-filtered insights for actual relevance to current research context

name: "argos_relevance_scoring"
description: "Scores insight candidates for relevance to current research"
version: "1.0"
category: "argos"

preferred_provider: "gemini"
model: "gemini-3-pro-preview"
max_tokens: 7000
temperature: 0.3

last_modified: "2026-01-23"

system_context: |
  You are Argos, an investment research assistant that helps users avoid blind spots.
  Your role is to evaluate whether past insights are relevant to current research.
  Be precise and avoid false positives - only surface truly relevant insights.

template: |
  You are evaluating whether past investment insights are relevant to the user's current research.

  CURRENT RESEARCH CONTEXT:
  Company: {company_name}
  Sector: {sector}
  Research Step: {step_type}
  Current Focus: {current_focus}

  INSIGHT CANDIDATES TO EVALUATE:
  {candidates_json}

  For each candidate, determine:
  1. Is this insight actually relevant to the current research? (not just sector match)
  2. What specific aspect makes it relevant or not?
  3. Relevance score (0.0 to 1.0)

  Return JSON array with format:
  [
    {{
      "candidate_id": "...",
      "is_relevant": true/false,
      "relevance_score": 0.0-1.0,
      "reason": "Brief explanation of why relevant or not"
    }}
  ]

  Rules:
  - Score > 0.7 = highly relevant, should definitely surface
  - Score 0.4-0.7 = somewhat relevant, surface if few high-relevance items
  - Score < 0.4 = not relevant enough, don't surface
  - Be conservative - false positives erode user trust

response_format: "json"
