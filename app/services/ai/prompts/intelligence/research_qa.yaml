# AI Intelligence - Research Question Answering (RAG)
# Answer research questions based on provided documents

name: "research_qa"
description: "Answer questions based ONLY on provided documents (RAG pattern)"
version: "1.0"
category: "intelligence"

# AI Provider Configuration
preferred_provider: "gemini"  # Cost-effective for document Q&A
model: "gemini-2.5-flash"
max_tokens: 1000
temperature: 0.2

last_modified: "2026-01-01"

system_context: |
  You are a research assistant who answers questions based ONLY on provided documents.
  If information is not in the documents, clearly state that.
  Cite specific parts of documents when answering.

template: |
  Answer the question based ONLY on the provided documents.
  If the information is not in the documents, say so clearly.

  COMPANY: {company_name}
  SECTOR: {sector}

  DOCUMENTS:
  {documents_text}

  QUESTION:
  {question}

  Provide a clear, factual answer based on the documents above.
  If you reference specific information, mention which document it came from.

examples:
  - "According to Document 1, the company's revenue grew 25% YoY..."
  - "The documents do not contain information about the CEO's background."
  - "Document 2 mentions three key risks: regulatory changes, competition, and..."

output_format: |
  Clear paragraph answer with document citations where applicable.
  If information not found: "The provided documents do not contain information about [topic]."

tuning_notes: |
  - Very low temperature (0.2) for factual accuracy
  - Gemini preferred for cost efficiency with documents
  - Maximum 3 documents to stay within token limits
  - Emphasize grounding in provided text only
