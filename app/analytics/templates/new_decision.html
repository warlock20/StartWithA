{% extends "main/_base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header">
                <h2>Record Investment Decision</h2>
                <p class="text-muted mb-0">Document your decision for future learning</p>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('analytics.new_decision') }}">
                    <!-- Basic Decision Info -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="company_id" class="form-label">Company <span class="text-danger">*</span></label>
                            <select class="form-select" id="company_id" name="company_id" required>
                                <option value="">-- Select Company --</option>
                                {% for company in companies %}
                                <option value="{{ company.id }}">
                                    {{ company.name }} {% if company.ticker_symbol %}({{ company.ticker_symbol }}){% endif %}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="decision_type" class="form-label">Decision <span class="text-danger">*</span></label>
                            <select class="form-select" id="decision_type" name="decision_type" required>
                                <option value="">-- Select Decision --</option>
                                <option value="invest">Invest</option>
                                <option value="pass">Pass</option>
                                <option value="exit">Exit Position</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="confidence" class="form-label">Confidence Level (1-10) <span class="text-danger">*</span></label>
                        <input type="range" class="form-range" id="confidence" name="confidence" 
                               min="1" max="10" value="5" required>
                        <div class="d-flex justify-content-between">
                            <small>1 - Very Low</small>
                            <strong id="confidenceValue">5</strong>
                            <small>10 - Very High</small>
                        </div>
                    </div>
                    
                    <hr>
                    
                    <!-- Investment Thesis -->
                    <div class="mb-3">
                        <label for="investment_thesis" class="form-label">Investment Thesis</label>
                        <textarea class="form-control" id="investment_thesis" name="investment_thesis" rows="4"
                                  placeholder="Why are you making this decision? What's your thesis?"></textarea>
                    </div>
                    
                    <!-- Expectations -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="expected_return" class="form-label">Expected Return (%)</label>
                            <input type="number" class="form-control" id="expected_return" name="expected_return" 
                                   step="0.1" placeholder="e.g., 25">
                        </div>
                        <div class="col-md-6">
                            <label for="expected_timeframe" class="form-label">Expected Timeframe (months)</label>
                            <input type="number" class="form-control" id="expected_timeframe" name="expected_timeframe" 
                                   min="1" placeholder="e.g., 24">
                        </div>
                    </div>
                    
                    <!-- Pre-mortem Analysis -->
                    <div class="card mb-3">
                        <div class="card-header">
                            <h5 class="mb-0">Pre-Mortem Analysis</h5>
                            <small class="text-muted">Think ahead: what could go right or wrong?</small>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label for="key_assumptions" class="form-label">Key Assumptions</label>
                                <textarea class="form-control" id="key_assumptions" name="key_assumptions" rows="3"
                                          placeholder="List your key assumptions (one per line)"></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label for="biggest_risks" class="form-label">Biggest Risks</label>
                                <textarea class="form-control" id="biggest_risks" name="biggest_risks" rows="3"
                                          placeholder="What could cause this investment to fail? (one per line)"></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label for="exit_criteria" class="form-label">Exit Criteria</label>
                                <textarea class="form-control" id="exit_criteria" name="exit_criteria" rows="2"
                                          placeholder="Under what conditions would you exit this position?"></textarea>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Submit -->
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('analytics.decision_journal_list') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary btn-lg">Record Decision</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
// Update confidence display
document.getElementById('confidence').addEventListener('input', function(e) {
    document.getElementById('confidenceValue').textContent = e.target.value;
});
</script>
{% endblock %}
