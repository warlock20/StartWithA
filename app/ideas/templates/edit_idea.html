{% extends "main/_base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow">
            <div class="card-header">
                <h3 class="mb-0">Edit Idea</h3>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('ideas.edit_idea', idea_id=idea.id) }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Idea Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-lg" id="name" name="name" value="{{ idea.name }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="idea_type" class="form-label">Type</label>
                        <select class="form-select" id="idea_type" name="idea_type">
                            <option value="company" {% if idea.idea_type == 'company' %}selected{% endif %}>Company</option>
                            <option value="sector" {% if idea.idea_type == 'sector' %}selected{% endif %}>Sector/Industry</option>
                            <option value="theme" {% if idea.idea_type == 'theme' %}selected{% endif %}>Theme/Trend</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-sm-8 mb-3">
                            <label for="base_ticker" class="form-label">Ticker (if applicable)</label>
                            <input type="text" class="form-control" id="base_ticker" name="base_ticker" value="{{ base_ticker }}" style="text-transform: uppercase;">
                        </div>
                        <div class="col-sm-4 mb-3">
                            <label for="exchange_suffix" class="form-label">Exchange</label>
                            <select class="form-select" id="exchange_suffix" name="exchange_suffix">
                                {% for suffix, name in exchanges.items() %}
                                    <option value="{{ suffix }}" {% if suffix == exchange_suffix %}selected{% endif %}>{{ name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="source" class="form-label">Source</label>
                        <input type="text" class="form-control" id="source" name="source" value="{{ idea.source or '' }}">
                    </div>

                    <div class="mb-3">
                        <label for="thesis_summary" class="form-label">One-sentence thesis</label>
                        <textarea class="form-control" id="thesis_summary" name="thesis_summary" rows="2">{{ idea.thesis_summary or '' }}</textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="initial_notes" class="form-label">Additional Notes</label>
                        <textarea class="form-control" id="initial_notes" name="initial_notes" rows="4">{{ idea.initial_notes or '' }}</textarea>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('ideas.inbox') }}" class="btn btn-outline-secondary">Cancel</a>
                        <div>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#deleteModal">
                                Delete
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="deleteModalLabel">Confirm Deletion</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        Are you sure you want to permanently delete the idea "{{ idea.name }}"? This action cannot be undone.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <form action="{{ url_for('ideas.delete_idea', idea_id=idea.id) }}" method="POST">
            <button type="submit" class="btn btn-danger">Delete Idea</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
