{% extends "main/_base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header">
                <h1 class="card-title text-center">{{ title }}</h1>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('checklists.new_checklist') }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Checklist Name:</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ name if name else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description (Optional):</label>
                        <textarea class="form-control" id="description" name="description" rows="3">{{ description if description else '' }}</textarea>
                    </div>

                    <hr>
                    <h5>Initial Items (Optional)</h5>

                    {% set num_initial_slots = 3 %}
                    {% for i in range(num_initial_slots) %}
                        <div class="card bg-light p-3 mb-3">
                            <div class="mb-2">
                                <label for="item_text_{{i}}" class="form-label">Item {{ i+1 }} Text:</label>
                                <input type="text" class="form-control" id="item_text_{{i}}" name="item_text[]" 
                                       value="{{ item_texts[i] if item_texts and i < item_texts|length else '' }}" 
                                       placeholder="Item {{ i+1 }} text">
                            </div>
                            <div>
                                <label for="item_llm_prompt_{{i}}" class="form-label">Optional LLM Prompt for Item {{ i+1 }}:</label>
                                <textarea class="form-control" id="item_llm_prompt_{{i}}" name="item_llm_prompt[]" rows="2" 
                                          placeholder="E.g., What are the key revenue drivers?">{{ llm_prompts_for_items[i] if llm_prompts_for_items and i < llm_prompts_for_items|length else '' }}</textarea>
                            </div>
                        </div>
                    {% endfor %}

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Create Checklist</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
