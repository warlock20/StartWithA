{# Annotations Tab — All document annotations for this company #}

<div id="company-annotations-panel">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h6 class="mb-0"><i class="bi bi-pin-angle me-1"></i>Document Annotations</h6>
            <small class="text-muted">All pins and highlights across your documents</small>
        </div>
        <span id="company-annotations-count" class="badge bg-secondary" style="display:none;">0</span>
    </div>

    <div id="company-annotations-list">
        <div class="text-center text-muted py-4">
            <span class="spinner-border spinner-border-sm me-1"></span> Loading annotations...
        </div>
    </div>
</div>
