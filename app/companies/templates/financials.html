{% extends "main/_base.html" %}

{% block content %}
    <div class="dashboard-header-card">
        <div class="dashboard-header">
            <div>
                <h1><i class="bi bi-bar-chart-line me-2"></i>{{ title }}</h1>
            </div>
            <div class="dashboard-header-actions">
                <a href="{{ url_for('companies.company_dashboard', company_id=company.id) }}" class="position-btn">
                    <i class="bi bi-arrow-left"></i> Back
                </a>
            </div>
        </div>
    </div>

    <div class="row g-4 mt-2">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">Revenue Trend</div>
                <div class="card-body">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">Net Income Trend</div>
                <div class="card-body">
                    <canvas id="netIncomeChart"></canvas>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

{% block scripts %}
    {{ super() }}

    <script>
        const pageChartData = {{ chart_data|tojson }};
    </script>

    <script src="{{ url_for('static', filename='js/financials_charts.js') }}" defer></script>
{% endblock %}
