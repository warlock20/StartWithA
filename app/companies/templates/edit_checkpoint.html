{% extends "main/_base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header">
                <h1 class="card-title text-center">{{ title }}</h1>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('companies.edit_checkpoint', checkpoint_id=checkpoint.id) }}">
                    <div class="mb-3">
                        <label for="metric" class="form-label">Metric</label>
                        <input type="text" class="form-control" id="metric" name="metric" value="{{ checkpoint.metric }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="expectation" class="form-label">Expectation / Target</label>
                        <input type="text" class="form-control" id="expectation" name="expectation" value="{{ checkpoint.expectation }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="target_date" class="form-label">Target Date</label>
                        {# Format date for the HTML date input value attribute #}
                        <input type="date" class="form-control" id="target_date" name="target_date" value="{{ checkpoint.target_date.strftime('%Y-%m-%d') }}" required>
                    </div>
                    <div class="d-flex justify-content-end">
                        <a href="{{ url_for('companies.destination_analysis', company_id=checkpoint.company_id) }}" class="btn btn-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
