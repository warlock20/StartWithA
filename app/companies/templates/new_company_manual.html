{% extends "main/_base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h1 class="card-title text-center">{{ title }}</h1>
            </div>
            <div class="card-body">
                {# The form posts to the same confirmation route as the successful lookup #}
                <form method="POST" action="{{ url_for('companies.add_company_confirmed') }}">

                    <div class="mb-3">
                        <label for="ticker_symbol" class="form-label">Ticker Symbol:</label>
                        {# The ticker is pre-filled and read-only as it's the one we looked up #}
                        <input type="text" class="form-control" id="ticker_symbol" name="ticker_symbol" value="{{ ticker }}" readonly>
                    </div>

                    <div class="mb-3">
                        <label for="name" class="form-label">Company Name:</label>
                        {# User must now enter the name manually #}
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>

                    <div class="d-flex justify-content-between">
                         <a href="{{ url_for('companies.new_company') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Add Company</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
