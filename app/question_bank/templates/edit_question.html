{% extends "main/_base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header">
                <h1 class="card-title text-center">{{ title }}</h1>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('question_bank.edit_question', item_id=question.id) }}">
                    <div class="mb-3">
                        <label for="text" class="form-label">Question Text</label>
                        <textarea name="text" id="text" class="form-control" rows="3" required>{{ question.text }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="llm_prompt" class="form-label">Optional LLM Prompt</label>
                        <textarea name="llm_prompt" id="llm_prompt" class="form-control" rows="2">{{ question.llm_prompt if question.llm_prompt }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="sector" class="form-label">Sector Tag (Optional)</label>
                        <input type="text" name="sector" id="sector" class="form-control" 
                               value="{{ question.sector if question.sector }}"
                               placeholder="Leave blank for 'General' or select/type a sector" 
                               list="existing_sectors_datalist">
                        <datalist id="existing_sectors_datalist">
                            {% for s in existing_sectors %}
                                <option value="{{ s }}">
                            {% endfor %}
                        </datalist>
                    </div>
                    <div class="d-flex justify-content-end">
                        <a href="{{ url_for('question_bank.index') }}" class="btn btn-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
