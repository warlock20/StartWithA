{% extends "main/_base.html" %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1>✏️ Edit Question</h1>
        <p class="text-muted mb-0">Update your question details and sector classification</p>
    </div>
    <div>
        <a href="{{ url_for('question_bank.index') }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back to Question Bank
        </a>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">📝 Question Details</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('question_bank.edit_question', item_id=question.id) }}">
                    <div class="mb-3">
                        <label for="text" class="form-label">Question Text</label>
                        <textarea name="text" id="text" class="form-control" rows="3" required>{{ question.text }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="llm_prompt" class="form-label">Optional LLM Prompt</label>
                        <textarea name="llm_prompt" id="llm_prompt" class="form-control" rows="2">{{ question.llm_prompt if question.llm_prompt }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="sector" class="form-label">Sector Tag (Optional)</label>
                        <input type="text" name="sector" id="sector" class="form-control" 
                               value="{{ question.sector if question.sector }}"
                               placeholder="Leave blank for 'General' or select/type a sector" 
                               list="existing_sectors_datalist">
                        <datalist id="existing_sectors_datalist">
                            {% for s in existing_sectors %}
                                <option value="{{ s }}">
                            {% endfor %}
                        </datalist>
                    </div>
                    <div class="d-flex justify-content-between">
                        <form method="POST" action="{{ url_for('question_bank.delete_question', item_id=question.id) }}" style="display: inline;">
                            <button type="submit" class="btn btn-outline-danger"
                                    onclick="return confirm('⚠️ Delete this question permanently?\n\nThis action cannot be undone.');">
                                <i class="bi bi-trash"></i> Delete Question
                            </button>
                        </form>
                        <div>
                            <a href="{{ url_for('question_bank.index') }}" class="btn btn-secondary me-2">
                                <i class="bi bi-x-circle"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Save Changes
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<style>
/* Responsive improvements */
@media (max-width: 768px) {
    .d-flex.justify-content-between {
        flex-direction: column;
        gap: 1rem;
    }

    .d-flex.justify-content-between > div {
        width: 100%;
    }

    .d-flex.justify-content-between > div > .btn {
        width: 100%;
    }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Auto-focus the text field for better UX
    const textField = document.getElementById('text');
    if (textField) {
        textField.focus();
        // Move cursor to end of text
        textField.setSelectionRange(textField.value.length, textField.value.length);
    }
});
</script>
{% endblock %}
