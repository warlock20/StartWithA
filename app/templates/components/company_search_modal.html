<!-- Company Search Modal -->
<div class="modal fade" id="companySearchModal" tabindex="-1" aria-labelledby="companySearchModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="companySearchModalLabel">🏢 Select Company</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <!-- Search Input -->
                <div class="mb-3">
                    <label for="companySearch" class="form-label">Search by ticker symbol or company name</label>
                    <input type="text" class="form-control" id="companySearch"
                           placeholder="e.g., AAPL, Apple Inc, Microsoft..."
                           autocomplete="off">
                    <div class="form-text">Start typing to search existing companies or add a new one</div>
                </div>

                <!-- Search Results -->
                <div id="searchResults" class="mb-3" style="display: none;">
                    <h6>Search Results:</h6>
                    <div id="resultsList" class="list-group"></div>
                </div>

                <!-- Quick Add Form -->
                <div id="quickAddForm" class="border-top pt-3" style="display: none;">
                    <h6>📝 Add New Company</h6>
                    <div class="row">
                        <div class="col-md-4">
                            <label for="newCompanyTicker" class="form-label">Ticker Symbol <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="newCompanyTicker" required
                                   placeholder="e.g., AAPL" style="text-transform: uppercase;">
                        </div>
                        <div class="col-md-8">
                            <label for="newCompanyName" class="form-label">Company Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="newCompanyName" required
                                   placeholder="e.g., Apple Inc.">
                        </div>
                    </div>
                    <div class="row mt-2">
                        <div class="col-md-6">
                            <label for="newCompanyIndustry" class="form-label">Industry (Optional)</label>
                            <input type="text" class="form-control" id="newCompanyIndustry"
                                   placeholder="e.g., Technology">
                        </div>
                        <div class="col-md-6">
                            <label for="newCompanySector" class="form-label">Sector (Optional)</label>
                            <input type="text" class="form-control" id="newCompanySector"
                                   placeholder="e.g., Consumer Electronics">
                        </div>
                    </div>
                    <div class="mt-2">
                        <label for="newCompanySummary" class="form-label">Company Summary (Optional)</label>
                        <textarea class="form-control" id="newCompanySummary" rows="3"
                                  placeholder="Brief description of what the company does..."></textarea>
                        <div class="form-text">A short summary helps with AI-powered analysis in research workflows</div>
                    </div>
                    <button type="button" class="btn btn-success mt-2" id="addNewCompanyBtn">
                        ➕ Add Company
                    </button>
                </div>

                <!-- Selected Company Display -->
                <div id="selectedCompanyDisplay" class="alert alert-success" style="display: none;">
                    <h6>✅ Selected Company:</h6>
                    <div id="modalSelectedCompanyInfo"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="confirmCompanySelection" disabled>
                    Select Company
                </button>
            </div>
        </div>
    </div>
</div>
