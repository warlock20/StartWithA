{% extends "main/_base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h1 class="card-title text-center">{{ title }}</h1>
            </div>
            <div class="card-body">
                <!-- Auth0 Signup Option -->
                <div class="mb-4">
                    <div class="d-grid gap-2">
                        <a href="{{ url_for('auth.auth0_login') }}" class="btn btn-outline-primary btn-lg">
                            <i class="bi bi-shield-lock"></i> Sign up with Auth0
                        </a>
                    </div>
                    <p class="text-center text-muted mt-3 mb-3">
                        <small>Quick signup with Google, GitHub, or email</small>
                    </p>
                </div>

                <!-- Divider -->
                <div class="d-flex align-items-center mb-4">
                    <hr class="flex-grow-1">
                    <span class="px-3 text-muted">OR</span>
                    <hr class="flex-grow-1">
                </div>

                <!-- Traditional Registration Form -->
                <form method="POST" action="{{ url_for('auth.register') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username:</label>
                        <input type="text" class="form-control" id="username" name="username" value="{{ request.form.username if request.form else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email:</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ request.form.email if request.form else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password:</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>

                    <div class="mb-3">
                        <label for="password_confirm" class="form-label">Confirm Password:</label>
                        <input type="password" class="form-control" id="password_confirm" name="password_confirm" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Register with Password</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center">
                <p class="mb-0">Already have an account? <a href="{{ url_for('auth.login') }}">Log in here</a>.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
