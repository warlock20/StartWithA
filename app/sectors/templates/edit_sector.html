{% extends "main/_base_companies.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h1 class="card-title text-center">{{ title }}</h1>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('sectors.edit_sector', analysis_id=analysis.id) }}">
                    <div class="mb-3">
                        <label for="sector_name" class="form-label">Sector Name:</label>
                        <input type="text" class="form-control" id="sector_name" name="sector_name" value="{{ analysis.sector_name }}" required>
                    </div>
                    <div class="d-flex justify-content-end">
                        <a href="{{ url_for('sectors.notebook', sector_name=analysis.sector_name) }}" class="btn btn-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
