<!-- Create/Edit Section Modal -->
<div class="modal fade" id="sectionModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="sectionModalTitle">Create Section</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="sectionId">
                <div class="mb-3">
                    <label class="form-label">Section Title *</label>
                    <input type="text" id="sectionTitle" class="form-control" placeholder="e.g., Key Themes, Risks & Challenges" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description (optional)</label>
                    <textarea id="sectionDescription" class="form-control" rows="2" placeholder="Brief description of this section"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Icon (optional)</label>
                    <input type="text" id="sectionIcon" class="form-control" placeholder="e.g., 💡, 🎯, ⚠️">
                    <small class="text-muted">Add an emoji or leave blank</small>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveSection()">
                    <i class="bi bi-check-circle"></i> <span id="sectionSaveBtn">Create Section</span>
                </button>
            </div>
        </div>
    </div>
</div>
