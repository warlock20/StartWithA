<!-- Document Templates Modal -->
<div class="modal fade" id="templatesModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title font-poppins"><i class="bi bi-file-earmark-text"></i> Insert Template</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="editorNotReady" class="alert alert-warning" style="display: none;">
                    <i class="bi bi-exclamation-triangle"></i> Editor is loading... Please wait a moment.
                </div>
                <p class="text-muted mb-3">Click a template to insert formatted content at cursor position</p>
                <div class="template-modal-grid">
                    {% for template in template_list %}
                    <div class="template-card" onclick="insertTemplate('{{ template.key }}');">
                        <h6>{{ template.icon }} {{ template.name }}</h6>
                        <p>{{ template.description }}</p>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Check editor status when modal is shown
document.addEventListener('DOMContentLoaded', function() {
    const modal = document.getElementById('templatesModal');
    if (!modal) return;

    modal.addEventListener('show.bs.modal', function() {
        const alert = document.getElementById('editorNotReady');
        if (!alert) return;

        // Function to check if editor is ready
        function checkEditorReady() {
            // Check for main document editor specifically from the map
            const editor = window.blockNoteEditors?.['sectorEditor'];
            const isReady = editor && typeof editor.insertHTML === 'function';

            console.log('Main document editor ready check:', {
                editorsMapExists: !!window.blockNoteEditors,
                availableEditors: window.blockNoteEditors ? Object.keys(window.blockNoteEditors) : [],
                sectorEditorExists: !!editor,
                hasInsertHTML: editor?.insertHTML !== undefined,
                isFunction: typeof editor?.insertHTML === 'function',
                isReady: isReady
            });

            return isReady;
        }

        // Initial check
        const isReady = checkEditorReady();
        alert.style.display = isReady ? 'none' : 'block';

        // If not ready, check multiple times with increasing delays
        if (!isReady) {
            const delays = [500, 1000, 2000, 3000];
            delays.forEach(delay => {
                setTimeout(() => {
                    if (checkEditorReady()) {
                        alert.style.display = 'none';
                        console.log('✓ Editor became ready after', delay, 'ms');
                    }
                }, delay);
            });
        }
    });
});
</script>
