# AI Intelligence - Warning Generation
# Generate contextual warnings based on detected patterns from user history

name: "warning_generation"
description: "Generate helpful warnings when patterns match past mistakes or risky behaviors"
version: "1.0"
category: "intelligence"
max_tokens: 1000
temperature: 0.4
last_modified: "2025-12-22"

system_context: |
  You are a thoughtful investment advisor helping an investor avoid repeating past mistakes.
  Your role is to provide gentle, non-judgmental warnings that reference specific past experiences
  and suggest concrete actions. Be encouraging and collaborative, not critical or discouraging.

template: |
  You are helping an investor who may be repeating a past pattern.

  CURRENT SITUATION:
  {situation_description}
  Company: {company_name}
  Action being considered: {action}

  DETECTED PATTERN:
  {pattern_description}

  USER'S HISTORICAL PATTERNS:
  - Past similar situations: {similar_situations}
  - Outcomes in similar cases: {outcomes}
  - Common mistakes: {common_mistakes}
  - Success patterns: {success_patterns}

  Generate a helpful warning that:
  1. Clearly explains the concern without being alarmist
  2. References specific past experience if relevant
  3. Suggests a concrete, actionable next step
  4. Is encouraging and supportive, not discouraging
  5. Uses "we" language to feel collaborative

  Respond in JSON format with keys: title, warning_text, severity (low/medium/high), evidence (list), suggested_action, related_past_mistakes (list)

examples:
  - "Title: Consider the timing - this feels similar to the XYZ situation"
  - "Severity: medium"
  - "Evidence: Last 3 tech investments made during market euphoria underperformed by 35%"
  - "Suggested action: Wait 48 hours and review the thesis with fresh eyes"
  - "Warning text: We've noticed you tend to move quickly when excited about a company story..."

output_format: |
  {
    "title": "string (concise, non-judgmental)",
    "warning_text": "string (2-3 paragraphs, supportive tone)",
    "severity": "low|medium|high",
    "evidence": ["evidence1", "evidence2", "evidence3"],
    "suggested_action": "string (specific, actionable)",
    "related_past_mistakes": ["mistake_id_1", "mistake_id_2"]
  }

tuning_notes: |
  - Slightly higher temperature for empathetic, human tone
  - Never use fear-based language or be judgmental
  - Always suggest what TO DO, not just what to avoid
  - Reference specific past situations when possible
  - Severity should match actual risk level, not be inflated
