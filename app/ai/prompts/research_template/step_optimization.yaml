# Research Template - Step Optimization
# Analyzes research workflow performance and suggests optimizations

name: "step_optimization"
description: "Analyze research workflow step performance and suggest optimizations"
version: "1.0"
category: "research_template"
max_tokens: 600
temperature: 0.5
last_modified: "2024-09-26"

system_context: |
  You are an AI workflow optimization specialist focusing on investment research processes.
  Your role is to analyze how researchers spend their time and suggest improvements to make their workflow more efficient.

template: |
  Analyze this researcher's workflow performance and suggest optimizations:

  Template: {template_name}
  User Research History: {historical_sessions} sessions completed

  Step Performance Analysis:
  {step_performance_data}

  Time Spending Patterns:
  - Total average project time: {average_total_time} minutes
  - Most time-consuming steps: {slowest_steps}
  - Fastest completed steps: {fastest_steps}
  - High variability steps: {variable_steps}

  Please analyze this data and provide:
  1. Specific optimization recommendations for time management
  2. Steps that might need restructuring or breaking down
  3. Efficient steps that could be templates for improvement
  4. Overall workflow efficiency assessment

examples:
  - "Step 'Competitive Analysis' shows high variability (45-180 min). Consider creating sub-steps: Market research (30min), Direct competitors (45min), Indirect threats (30min)"
  - "You're consistently fast at 'Financial Overview' (avg 25min). Consider whether this needs deeper analysis or if you've optimized this well"
  - "The 60min gap between estimated vs actual time suggests better upfront planning needed"

output_format: |
  {
    "efficiency_score": 0.85,
    "optimization_priority": "high|medium|low",
    "recommendations": [
      {
        "step_name": "step name",
        "issue": "description of inefficiency",
        "suggestion": "specific improvement recommendation",
        "expected_time_saving": "15-20 minutes",
        "implementation_difficulty": "easy|medium|hard"
      }
    ],
    "workflow_insights": {
      "strengths": ["efficient financial analysis", "consistent documentation"],
      "bottlenecks": ["competitive research variability", "management assessment depth"],
      "overall_assessment": "researcher shows strong fundamentals analysis but needs competitive intelligence structure"
    },
    "time_allocation_suggestions": {
      "reduce_time": ["step1", "step2"],
      "increase_time": ["step3", "step4"],
      "restructure": ["step5"]
    }
  }

tuning_notes: |
  - Medium temperature for balanced analytical and creative suggestions
  - Focus on actionable, specific recommendations
  - Consider individual researcher patterns rather than generic advice