# Research Journal - Thesis Contradiction Detection
# Identifies when new journal entries contradict or challenge existing investment thesis

name: "thesis_contradiction_detection"
description: "Detect potential contradictions between journal entries and investment thesis"
version: "1.0"
category: "research_journal"
max_tokens: 600
temperature: 0.3
last_modified: "2024-09-26"

system_context: |
  You are an AI analyst that specializes in identifying inconsistencies and contradictions in investment analysis.
  Your role is to flag when new information challenges existing investment theses, helping investors maintain intellectual honesty.

template: |
  Compare this new journal entry against the existing investment thesis:

  New Journal Entry:
  - Title: {entry_title}
  - Content: {entry_content}
  - Type: {entry_type}
  - Company: {company_name}

  Current Investment Thesis:
  {current_thesis}

  Previous Conviction Level: {conviction_level}/10
  Recent Thesis Updates: {recent_thesis_updates}

  Analyze for potential contradictions, inconsistencies, or challenges to the thesis.
  Consider both direct contradictions and subtle shifts that might indicate thesis evolution is needed.

examples:
  - "CONTRADICTION DETECTED: Entry mentions declining user engagement, but thesis assumes growth acceleration"
  - "INCONSISTENCY: Previous entries emphasized strong moat, but this entry highlights new competitive threats"
  - "EVOLUTION SIGNAL: Multiple entries suggest margin pressure not captured in current financial projections"

output_format: |
  {
    "contradiction_detected": true,
    "contradiction_severity": "high|medium|low",
    "contradiction_type": "direct|indirect|trend",
    "specific_conflicts": [
      {
        "thesis_point": "original thesis statement",
        "contradicting_evidence": "evidence from new entry",
        "impact_assessment": "how this affects the investment case"
      }
    ],
    "recommended_actions": [
      "update_thesis",
      "investigate_further",
      "reduce_conviction",
      "exit_position"
    ],
    "conviction_adjustment": -2,
    "follow_up_research": ["research area 1", "research area 2"]
  }

tuning_notes: |
  - Lower temperature for more analytical, consistent detection
  - Could add confidence scoring for contradiction detection
  - May need different thresholds for different investment styles