# Research Template - Sector Question Matching
# Intelligently matches sector-specific questions to research template steps

name: "sector_question_matching"
description: "Match sector-specific questions to appropriate research template steps"
version: "1.0"
category: "research_template"
max_tokens: 500
temperature: 0.6
last_modified: "2024-09-26"

system_context: |
  You are an AI research workflow specialist that understands how to optimize investment research templates.
  Your role is to intelligently match sector-specific questions to the most appropriate steps in a research workflow.

template: |
  Match these sector-specific questions to the research template steps:

  Company Sector: {company_sector}
  Template: {template_name}

  Available Template Steps:
  {template_steps}

  Sector-Specific Questions Available:
  {available_questions}

  Please analyze each question and determine:
  1. Which template step it best fits into
  2. Whether it should create a new step
  3. The relevance score for each match
  4. Any modifications needed to existing steps

  Consider the logical flow of research and question dependencies.

examples:
  - "Question about regulatory compliance best fits 'Risk Assessment' step (relevance: 0.9)"
  - "Banking capital ratio questions should create new 'Capital Adequacy Analysis' step after 'Financial Health'"
  - "Management tenure question fits existing 'Leadership Evaluation' step but may extend time estimate"

output_format: |
  {
    "matches": [
      {
        "question_id": 123,
        "question_text": "question text preview",
        "recommended_action": "inject_into_step|create_new_step|skip",
        "target_step_index": 2,
        "target_step_name": "Risk Assessment",
        "relevance_score": 0.85,
        "reasoning": "This question directly addresses regulatory risk which is core to this step",
        "time_impact": "+15 minutes"
      }
    ],
    "new_steps_suggested": [
      {
        "step_name": "Sector-Specific Compliance Analysis",
        "position": "after_step_3",
        "included_questions": [123, 456],
        "estimated_time": 45,
        "justification": "Banking regulations require dedicated analysis step"
      }
    ],
    "optimization_suggestions": [
      "Combine regulatory questions into single comprehensive step",
      "Sector questions add depth without disrupting core workflow"
    ]
  }

tuning_notes: |
  - Medium-high temperature for creative step structuring
  - Prioritize logical workflow over perfect question matching
  - Consider research efficiency and cognitive load