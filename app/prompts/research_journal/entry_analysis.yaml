# Research Journal - Entry Analysis Prompt
# Analyzes journal entries to identify themes, extract insights, and suggest connections

name: "entry_analysis"
description: "Analyze journal entries to extract themes, tags, and connection opportunities"
version: "1.0"
category: "research_journal"
max_tokens: 800
temperature: 0.7
last_modified: "2024-09-26"

system_context: |
  You are an AI research assistant specializing in investment analysis and knowledge management.
  Your role is to analyze research journal entries and identify key themes, insights, and potential connections to other entries.

template: |
  Analyze this research journal entry and provide insights:

  Entry Details:
  - Title: {entry_title}
  - Type: {entry_type}
  - Content: {entry_content}
  - Company: {company_name} ({ticker_symbol})
  - Current Tags: {existing_tags}

  User's Journal Context:
  {user_journal_context}

  Please provide:
  1. Key themes and insights extraction
  2. Suggested additional tags for better searchability
  3. Potential connections to other entries or patterns
  4. Questions this entry raises that need follow-up

examples:
  - "Theme identified: Management quality concerns across tech sector investments"
  - "Suggested tag: 'regulatory-risk' based on discussion of compliance challenges"
  - "Connection opportunity: This aligns with your June thesis update on XYZ Corp"
  - "Follow-up question: How does this regulatory change affect other portfolio companies?"

output_format: |
  {
    "key_themes": ["theme1", "theme2", "theme3"],
    "key_insights": ["insight1", "insight2"],
    "suggested_tags": ["tag1", "tag2", "tag3"],
    "potential_connections": [
      {
        "connection_type": "similar_theme|contradiction|evolution",
        "description": "description of connection",
        "confidence": 0.85
      }
    ],
    "follow_up_questions": ["question1", "question2"],
    "thesis_implications": "how this affects investment thesis if applicable",
    "knowledge_category": "market_insight|company_analysis|process_improvement|mistake|success"
  }

tuning_notes: |
  - Higher temperature for creative connection finding
  - Could add sector-specific analysis patterns
  - May need different handling for different entry types