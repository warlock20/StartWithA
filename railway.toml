# Railway Build Configuration
# https://docs.railway.com/reference/config-as-code

# Using Dockerfile for build (no nixpacks config needed)
[build]
builder = "dockerfile"

[deploy]
# No startCommand - using Dockerfile CMD instead
# The Dockerfile uses: CMD gunicorn --bind 0.0.0.0:$PORT run:app

# Health check
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
